name: Docs checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly link rot sweep (Mondays 06:00 UTC).
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'

  link-check:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml --no-progress './**/*.md'
          fail: true
